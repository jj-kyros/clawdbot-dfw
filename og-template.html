<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1A1A1A 0%, #2A2A3A 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      color: white;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(42, 92, 255, 0.15);
      border: 1px solid rgba(42, 92, 255, 0.3);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 14px;
      color: #6B8AFF;
      margin-bottom: 32px;
      width: fit-content;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #1DB954;
      border-radius: 50%;
    }
    h1 {
      font-size: 64px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 24px;
    }
    .accent {
      color: #2A5CFF;
    }
    p {
      font-size: 24px;
      color: rgba(255,255,255,0.7);
      max-width: 700px;
      line-height: 1.5;
    }
    .logo {
      position: absolute;
      bottom: 60px;
      right: 80px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: #2A5CFF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 22px;
      color: white;
    }
  </style>
</head>
<body>
  <div class="badge">
    <span class="dot"></span>
    Now installing across DFW
  </div>
  <h1>An AI <span class="accent">employee</span> that<br>never clocks out.</h1>
  <p>Dedicated hardware. Installed in your office. Runs 24/7.</p>
  <div class="logo">
    <div class="logo-icon">C</div>
    clawdbotdfw.com
  </div>
</body>
</html>
